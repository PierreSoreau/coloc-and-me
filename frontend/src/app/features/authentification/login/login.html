<app-header-auth></app-header-auth>

<section class="login-card">
    <p class="subtitle">Connectez-vous pour accéder à votre espace colocation</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <app-input labelText="Email" srcAssetInput="assets/logo-envelope.png" altAssetInput="Logo enveloppe"
            inputType="text" placeholderText="votreemail@exemple.com" controlName="email" [form]="loginForm"
            [errorMessage]="getErrorMessage('L\'Email','email')">
        </app-input>

        <app-input labelText="Mot de passe" srcAssetInput="assets/logo-padlock.png" altAssetInput="Logo cadenas"
            inputType="password" placeholderText="••••••••" controlName="password" [form]="loginForm"
            [errorMessage]="getErrorMessage('Le mot de passe','password')">
        </app-input>
        <app-button-record buttonText="Se connecter"></app-button-record>

    </form>
    @if(wrongForm){
    <p>Le mot de passe ou l'adresse email est incorrect</p>
    }
    @if(invalidForm){
    <p>Les champs ne sont pas remplis correctement</p>
    }
    <a routerLink="/auth/forgot-password" class="forgot-link">Mot de passe oublié ?</a>

</section>

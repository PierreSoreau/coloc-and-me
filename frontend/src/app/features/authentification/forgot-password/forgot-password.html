<section class="forgot-password-card">
    <h2>Mot de passe oublié?</h2>
    <p class="subtitle">Renseignez votre email et nous vous enverrons
        un lien pour réinitialiser votre mot de passe</p>
    <form [formGroup]="forgotPasswordForm">
        <app-input labelText="Email" srcAssetInput="assets/logo-envelope.png" altAssetInput="Logo enveloppe"
            inputType="text" placeholderText="votreemail@exemple.com" controlName="email" [form]="forgotPasswordForm"
            [errorMessage]="getErrorMessage('L\'Email','email')">
        </app-input>

        <app-button-record buttonText="Créer un nouveau de mot de passe"></app-button-record>

    </form>
    <a routerLink="/auth/login" class="back-home">Retour à la connection</a>

</section>

<section class="reset-password-card">
    <app-button-back (clickBack)="goBack()"></app-button-back>
    <h2>Nouveau mot de passe</h2>
    <p class="subtitle">Choisissez un nouveau mot de passe sécurisé pour votre compte</p>
    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <app-input labelText="Nouveau mot de passe" srcAssetInput="assets/logo-padlock.png" altAssetInput="Logo cadenas"
            inputType="password" placeholderText="••••••••" controlName="password" [form]="resetForm"
            [errorMessage]="getErrorMessage('Le mot de passe','password')">
        </app-input>

        <app-input labelText="Confirmer le mot de passe" srcAssetInput="assets/logo-padlock.png"
            altAssetInput="Logo cadenas" inputType="password" placeholderText="••••••••" controlName="confirmPassword"
            [form]="resetForm" [errorMessage]="getConfirmPasswordError()">
        </app-input>
        <app-button-record buttonText="Réinitialiser le mot de passe" class="back-dashboard"></app-button-record>

    </form>
</section>
